<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide to Markets - Pines Finance Portfolio</title>
  <link rel="icon" type="image/png" href="image/logo.png">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav>
    <div class="logo">
      <a href="index.html" aria-label="Pines Finance Logo"></a>
    </div>
    <div class="nav-items">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="guide.html">Guide to Markets</a>
      <div class="dropdown">
        <span class="dropdown-trigger">Papers</span>
        <div class="dropdown-menu">
          <a href="nim.html">Fed Rates on NIM</a>
          <a href="beta.html">Beta and Valuation</a>
          <a href="paper3.html">Paper 3</a>
          <a href="paper4.html">Paper 4</a>
        </div>
      </div>
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle light and dark mode">
        <span class="mode-icon-light">☀️</span>
        <span class="mode-icon-dark">🌙</span>
      </button>
    </div>
  </nav>

  <section class="guide-section">
    <div class="guide-container scroll-reveal">
      <span class="guide-subtitle">Pines Finance's</span>
      <h1 class="guide-heading">Guide to Markets</h1>
      
      <div class="guide-grid">
        <!-- Path 1: Stocks Dashboard -->
        <a href="stocks.html" class="guide-card-btn">
          <h2>Stocks</h2>
          <span class="btn-arrow">→</span>
        </a>
        
        <!-- Path 2: Options Dashboard -->
        <a href="options.html" class="guide-card-btn">
          <h2>Options</h2>
          <span class="btn-arrow">→</span>
        </a>
      </div>
    </div>
  </section>
  
  

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('active');
        } else {
          entry.target.classList.remove('active');
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.scroll-reveal').forEach((el) => observer.observe(el));
  </script>

  <script>
    const themeBtn = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
    }
    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('theme', 'dark');
      } else {
        localStorage.setItem('theme', 'light');
      }
    });
    const dropdownTrigger = document.querySelector('.dropdown-trigger');
if (dropdownTrigger) {
  dropdownTrigger.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdownTrigger.parentElement.classList.toggle('mobile-open');
  });
}
  </script>

</body>
</html>
